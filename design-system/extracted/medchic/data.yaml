    - emotion: "Innovation"
      reason: "Hero video background with dynamic content and modern typography signals forward-thinking approach"
    - emotion: "Community"
      reason: "Group photography in hero and people-focused section headings create belonging"
    - emotion: "Approachability"
      reason: "Rounded pill buttons, friendly LINE Seed Sans Thai font, and warm color accents soften the institutional feel"

