    - "Teal color bridges medical trust with innovation energy — neither too cold nor too warm"
    - "LINE Seed Sans Thai font provides excellent Thai readability while feeling modern and friendly"
    - "Pill-shaped buttons feel approachable while maintaining professional credibility"
    - "Card hover animations (translateY -15px + shadow increase) add satisfying interactivity"
    - "Structured navigation with clear program categories reduces cognitive load for diverse audience"

  design_philosophy:
    core_belief: "Health innovation should feel accessible, trustworthy, and community-driven"
    key_principles:
      - "Institutional credibility with modern warmth"
      - "Community-centered visual storytelling"
      - "Clear program hierarchy through card-based organization"
      - "Thai-first typography with English secondary"

