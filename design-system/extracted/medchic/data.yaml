    - name: "Pill-shaped CTAs"
      description: "40px border-radius buttons with generous padding create friendly, approachable interaction points"
    - name: "Card-based Content"
      description: "Rounded 22px cards with subtle shadows organize programs and services into scannable blocks"
    - name: "Video Hero"
