# Detailed animation states
animations:
  card-hover:
    type: "card"
    description: "Card lifts up with enhanced shadow"
    transition: "0.3s"
    states:
      default:
        boxShadow: "rgba(0, 0, 0, 0.06) 0px 12px 28px 0px"
        transform: "none"
      hover:
        boxShadow: "rgba(0, 0, 0, 0.2) 0px 25px 45px"
        transform: "translateY(-15px)"
  card-image-hover:
    type: "card"
    description: "Smaller lift with moderate shadow"
    transition: "0.5s"
    states:
      default:
        boxShadow: "none"
        transform: "none"
      hover:
        boxShadow: "rgba(0, 0, 0, 0.14) 0px 18px 40px"
        transform: "translateY(-8px)"
  card-icon-hover:
    type: "icon-in-card"
    description: "Icon scales and rotates on card hover"
    states:
      default:
        transform: "none"
      hover:
        transform: "scale(1.2) rotate(-10deg)"
  tab-btn-hover:
    type: "button"
    description: "Tab fills with teal and scales"
    states:
      default:
        background: "rgb(241, 241, 241)"
        color: "rgb(0, 159, 158)"
        transform: "none"
      hover:
        background: "rgb(0, 159, 158)"
        color: "rgb(255, 255, 255)"
        transform: "scale(1.05)"
  social-link-hover:
    type: "social"
    description: "Social icons scale on hover"
    states:
      default:
        transform: "none"
      hover:
        transform: "scale(1.1)"
  partner-slider-hover:
    type: "image"
    description: "Partner logos scale on hover, slider pauses"
    states:
      default:
        opacity: "0.7"
        transform: "none"
      hover:
        opacity: "1"
        transform: "scale(1.08)"

