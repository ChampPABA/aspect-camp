<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept C — Asclepius</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  :root {
    --navy: #0F2A4A; --navy-deep: #050D1A;
    --cream: #F1F1E8; --gold: #D4B978;
    --gold-from: #c3a456; --gold-to: #f0cb46;
    --red: #e85d5d;
    --font-heading: "Cormorant Garamond", serif;
    --font-sans: "IBM Plex Sans Thai", sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--navy-deep); color: var(--cream); font-family: var(--font-sans); overflow-x: hidden; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 64px; padding: 0 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(5,13,26,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.08); }
  .nav-brand { font-family: var(--font-heading); font-size: 22px; font-weight: 600; color: var(--gold); }
  .nav-label { font-size: 12px; color: rgba(255,255,255,0.3); margin-left: 8px; }
  .nav-cta { padding: 9px 22px; background: linear-gradient(135deg, var(--gold-from), var(--gold-to)); border-radius: 100px; color: var(--navy-deep); font-size: 13px; font-weight: 700; text-decoration: none; }

  /* Split hero */
  .hero { height: 100vh; display: grid; grid-template-columns: 1fr 1fr; }

  /* Left — Symbol panel */
  .hero-left { position: relative; background: var(--navy-deep); display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 80px 48px 40px; }
  .left-bg-gradient { position: absolute; inset: 0; background: radial-gradient(circle at 60% 50%, rgba(212,185,120,0.05) 0%, transparent 70%); }

  /* Caduceus icon — stylized medical symbol */
  .symbol-wrap { position: absolute; right: -40px; top: 50%; transform: translateY(-50%); opacity: 0.06; pointer-events: none; }
  .caduceus-svg { width: 200px; height: 300px; }

  .left-content { position: relative; z-index: 2; text-align: left; max-width: 440px; }
  .med-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(212,185,120,0.3); background: rgba(212,185,120,0.06); margin-bottom: 28px; }
  .med-badge .cross { font-size: 14px; color: var(--red); font-weight: 700; }
  .med-badge span { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); }
  .left-content h1 { font-family: var(--font-sans); font-size: clamp(48px, 5.5vw, 80px); font-weight: 800; line-height: 1.05; margin-bottom: 20px; }
  .left-content h1 em { font-style: normal; color: var(--gold); }
  .left-content .tagline { font-size: 17px; color: rgba(241,241,232,0.55); line-height: 1.7; margin-bottom: 36px; max-width: 34ch; }
  .left-content .date-row { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; padding: 14px 20px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; width: fit-content; }
  .date-row .cal-icon { font-size: 20px; }
  .date-row .date-text { font-size: 15px; font-weight: 500; }
  .date-row .date-sub { font-size: 12px; color: rgba(241,241,232,0.4); margin-top: 2px; }

  .cta-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn-primary { padding: 15px 36px; background: linear-gradient(135deg, var(--gold-from), var(--gold-to)); border-radius: 100px; color: var(--navy-deep); font-size: 15px; font-weight: 700; text-decoration: none; white-space: nowrap; }
  .btn-ghost { padding: 14px 28px; border: 1px solid rgba(212,185,120,0.4); border-radius: 100px; color: var(--gold); font-size: 14px; text-decoration: none; white-space: nowrap; }

  /* Right — Photo panel */
  .hero-right { position: relative; overflow: hidden; }
  .right-photo { position: absolute; inset: 0; background: url('../ex5/images/group-awards.webp') center/cover no-repeat; transform: scale(1.05); }
  .right-overlay { position: absolute; inset: 0; background: linear-gradient(to left, rgba(5,13,26,0.15) 0%, rgba(5,13,26,0.55) 100%); }

  /* Stats overlay on photo */
  .photo-stats { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; gap: 0; z-index: 2; }
  .pstat { text-align: center; padding: 16px 28px; background: rgba(5,13,26,0.75); backdrop-filter: blur(10px); border-top: 1px solid rgba(212,185,120,0.25); }
  .pstat:first-child { border-radius: 12px 0 0 12px; }
  .pstat:last-child { border-radius: 0 12px 12px 0; }
  .pstat + .pstat { border-left: 1px solid rgba(255,255,255,0.08); }
  .pstat-num { font-family: var(--font-heading); font-size: 36px; font-weight: 700; color: var(--gold); line-height: 1; }
  .pstat-label { font-size: 11px; color: rgba(241,241,232,0.5); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }

  /* Vertical divider line */
  .divider-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: linear-gradient(to bottom, transparent, rgba(212,185,120,0.3) 20%, rgba(212,185,120,0.3) 80%, transparent); z-index: 10; pointer-events: none; }

  .concept-badge { position: fixed; top: 80px; right: 20px; background: rgba(212,185,120,0.15); border: 1px solid var(--gold); border-radius: 8px; padding: 8px 14px; font-size: 11px; color: var(--gold); letter-spacing: 0.1em; z-index: 200; }
</style>
</head>
<body>

<nav>
  <div style="display:flex;align-items:center;">
    <span class="nav-brand">ASPECT</span>
    <span class="nav-label">Med Camp</span>
  </div>
  <a href="#" class="nav-cta">สมัครเข้าร่วม →</a>
</nav>

<div class="concept-badge">Concept C — Asclepius</div>

<section class="hero">
  <!-- Left: Text + Symbol -->
  <div class="hero-left">
    <div class="left-bg-gradient"></div>

    <!-- Caduceus watermark -->
    <div class="symbol-wrap">
      <svg class="caduceus-svg" viewBox="0 0 200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Staff -->
        <line x1="100" y1="20" x2="100" y2="290" stroke="#D4B978" stroke-width="4"/>
        <!-- Wings (simplified) -->
        <path d="M100,50 Q60,30 30,45 Q60,55 100,50" fill="none" stroke="#D4B978" stroke-width="2.5"/>
        <path d="M100,50 Q140,30 170,45 Q140,55 100,50" fill="none" stroke="#D4B978" stroke-width="2.5"/>
        <!-- Snakes (two spirals) -->
        <path d="M100,70 Q75,90 100,110 Q125,130 100,150 Q75,170 100,190 Q125,210 100,230" fill="none" stroke="#D4B978" stroke-width="2.5"/>
        <path d="M100,70 Q125,90 100,110 Q75,130 100,150 Q125,170 100,190 Q75,210 100,230" fill="none" stroke="#D4B978" stroke-width="2.5"/>
        <!-- Top circle -->
        <circle cx="100" cy="38" r="12" fill="none" stroke="#D4B978" stroke-width="2.5"/>
      </svg>
    </div>

    <div class="left-content" id="leftContent">
      <div class="med-badge">
        <span class="cross">✚</span>
        <span>Healthcare Innovation Camp</span>
      </div>
      <h1>เส้นทาง<br>สู่ <em>แพทย์</em><br>เริ่มที่นี่</h1>
      <p class="tagline">3 วันที่จะทำให้น้องรู้ว่า — ตัวเองเหมาะกับเส้นทางนี้ หรือเปล่า</p>
      <div class="date-row">
        <div class="cal-icon">📅</div>
        <div>
          <div class="date-text">1–3 พฤษภาคม 2568</div>
          <div class="date-sub">เชียงใหม่ · 3 วัน 2 คืน · 60 ที่นั่ง</div>
        </div>
      </div>
      <div class="cta-row">
        <a href="#" class="btn-primary">สมัครเข้าร่วม →</a>
        <a href="#" class="btn-ghost">ดูรายละเอียด</a>
      </div>
    </div>
  </div>

  <!-- Divider -->
  <div class="divider-line"></div>

  <!-- Right: Photo -->
  <div class="hero-right">
    <div class="right-photo" id="rightPhoto"></div>
    <div class="right-overlay"></div>
    <div class="photo-stats">
      <div class="pstat"><div class="pstat-num">3</div><div class="pstat-label">วันเต็ม</div></div>
      <div class="pstat"><div class="pstat-num">60</div><div class="pstat-label">ที่นั่ง</div></div>
      <div class="pstat"><div class="pstat-num">3</div><div class="pstat-label">ทุน</div></div>
    </div>
  </div>
</section>

<script>
  gsap.from('#leftContent > *', {
    opacity: 0,
    y: 24,
    duration: 0.7,
    stagger: 0.12,
    ease: 'power3.out',
    delay: 0.4
  });
  gsap.from('#rightPhoto', {
    scale: 1.08,
    duration: 1.4,
    ease: 'power2.out',
    delay: 0.2
  });
  gsap.from('.photo-stats .pstat', {
    opacity: 0,
    y: 20,
    duration: 0.6,
    stagger: 0.1,
    ease: 'power2.out',
    delay: 0.9
  });
  gsap.from('.divider-line', {
    scaleY: 0,
    transformOrigin: 'top center',
    duration: 1.2,
    ease: 'power2.out',
    delay: 0.3
  });
</script>
</body>
</html>
